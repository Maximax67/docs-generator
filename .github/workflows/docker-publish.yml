name: Build and Push Docker Image

on:
  push:
    branches: [main, dev]
  repository_dispatch:
    types: [frontend_updated]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ (github.ref_name == 'main' || github.event_name == 'repository_dispatch') && 'Production' || 'Development' }}
    env:
      FRONTEND_REPO: "https://github.com/Maximax67/docs-generator-frontend.git"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get Frontend Latest SHA
        id: frontend_sha
        run: |
          SHA=$(git ls-remote ${{ env.FRONTEND_REPO }} HEAD | awk '{ print $1 }')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/docs-generator
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'repository_dispatch' }}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            FRONTEND_REPO=${{ env.FRONTEND_REPO }}
            FRONTEND_SHA=${{ steps.frontend_sha.outputs.sha }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_FRONTEND_URL=${{ secrets.NEXT_PUBLIC_FRONTEND_URL }}
            NEXT_PUBLIC_SWAGGER_URL=${{ secrets.NEXT_PUBLIC_SWAGGER_URL }}
            NEXT_PUBLIC_POSTMAN_URL=${{ secrets.NEXT_PUBLIC_POSTMAN_URL }}
